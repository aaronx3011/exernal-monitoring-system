apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true

  - name: TimescaleDB
    type: grafana-postgresql-datasource
    url: timescaledb:5432
    database: monitoring
    user: monitor
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      database: monitoring
      postgresVersion: 1600

  - name: Loki
    type: loki
    url: http://loki:3100
    access: proxy
